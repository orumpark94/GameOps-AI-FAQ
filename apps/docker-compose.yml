services:
  chatbot-api:
    build:
      context: ./chatbot-api
    environment:
      NODE_ENV: development
      PORT: "8080"
      AWS_REGION: ap-northeast-2
      BEDROCK_KNOWLEDGE_BASE_ID: ${BEDROCK_KNOWLEDGE_BASE_ID:?BEDROCK_KNOWLEDGE_BASE_ID is required}
      BEDROCK_MODEL_ARN: ${BEDROCK_MODEL_ARN:?BEDROCK_MODEL_ARN is required}
      BEDROCK_RETRIEVAL_SCORE_THRESHOLD: ${BEDROCK_RETRIEVAL_SCORE_THRESHOLD:-0.6}
      CUSTOMER_SUPPORT_EMAIL: ${CUSTOMER_SUPPORT_EMAIL:-sjpark@hanbitsoft.com}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
    ports:
      - "8080:8080"

  chatbot-web:
    build:
      context: ./chatbot-web
    environment:
      NODE_ENV: development
      PORT: "3000"
      CHATBOT_API_BASE_URL: http://chatbot-api:8080
    ports:
      - "3000:3000"
    depends_on:
      - chatbot-api
